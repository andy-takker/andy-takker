name: markscribe

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  markscribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate README
        uses: muesli/readme-scribe@master
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        with:
          template: 'README.gtpl'
          writeTo: 'README.md'

      # markscribe strips HTML comments, so the blog-post-workflow markers must be
      # re-injected into README.md after generation (idempotent, guarded by grep).
      - name: Insert blog-post markers
        run: |
          if ! grep -q "BLOG-POST-LIST:START" README.md; then
            perl -0pi -e 's/(#+ .*Latest Articles on Habr\r?\n)/$1\n<!-- BLOG-POST-LIST:START -->\n<!-- BLOG-POST-LIST:END -->\n/' README.md
          fi
          grep -q "BLOG-POST-LIST:START" README.md

      - name: Sync latest Habr articles
        run: |
          python3 - <<'PY'
          import urllib.request, xml.etree.ElementTree as ET, re, html
          URL = "https://habr.com/ru/rss/users/andy-takker/publications/articles/"
          req = urllib.request.Request(URL, headers={"User-Agent": "Mozilla/5.0"})
          data = urllib.request.urlopen(req, timeout=30).read()
          items = ET.fromstring(data).findall(".//item")[:5]
          lines = []
          for it in items:
              title = html.unescape((it.findtext("title") or "").strip())
              link = (it.findtext("link") or "").strip().split("?")[0]
              if title and link:
                  lines.append(f"- [{title}]({link})")
          block = "\n".join(lines)
          if not block:
              raise SystemExit("No articles parsed from Habr RSS")
          with open("README.md", encoding="utf-8") as f:
              content = f.read()
          new = re.sub(
              r"(<!-- BLOG-POST-LIST:START -->).*?(<!-- BLOG-POST-LIST:END -->)",
              lambda m: f"{m.group(1)}\n{block}\n{m.group(2)}",
              content, flags=re.S,
          )
          if new == content:
              raise SystemExit("BLOG-POST-LIST markers not found in README.md")
          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new)
          print(block)
          PY

      - name: Commit README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'markscribe: autoupdate README.md'
